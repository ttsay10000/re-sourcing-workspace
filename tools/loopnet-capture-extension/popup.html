<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LoopNet Capture</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 12px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #171717;
      }
      label {
        display: block;
        margin: 0 0 8px;
        font-size: 12px;
        font-weight: 600;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        margin-top: 4px;
        padding: 7px 8px;
        border: 1px solid #d4d4d4;
        border-radius: 6px;
        font-size: 12px;
      }
      button {
        width: 100%;
        padding: 8px 10px;
        border: 0;
        border-radius: 6px;
        background: #171717;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }
      #status {
        min-height: 18px;
        margin-top: 8px;
        color: #525252;
        font-size: 12px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <label>
      Local API endpoint
      <input id="endpoint" value="http://localhost:4000/api/test-agent/loopnet/browser-capture" />
    </label>
    <label>
      Capture token
      <input id="token" placeholder="Paste token from Sourcing Agent" />
    </label>
    <button id="send">Send to Sourcing App</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>

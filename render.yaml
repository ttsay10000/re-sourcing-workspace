# Render Blueprint: web UI + API + Postgres + inbox cron job
# https://render.com/docs/blueprint-spec
#
# To have Render CREATE all services (including cron jobs):
#   1. Dashboard → New → Blueprint → connect this repo and branch.
#   2. Apply the blueprint so Render creates DB, API, Web, and the inbox cron.
# If you already have API/Web/DB and only need the cron:
#   Open your Blueprint in the dashboard and Apply/Sync so Render creates the missing cron job (re-sourcing-process-inbox).
#
# Env vars (set in Render dashboard or here):
#   API:  DATABASE_URL (from Postgres), NODE_ENV=production, CORS_ORIGIN=<web URL>
#   Web:  NEXT_PUBLIC_API_URL=<API service URL>
#
# Deploy order: Migrations run in preDeployCommand (after build, before start). If they fail, deploy is cancelled.

databases:
  - name: re-sourcing-db
    plan: basic-256mb  # match current plan; free tier cannot be set if DB was created on basic-256mb
    databaseName: re_sourcing
    user: re_sourcing

services:
  - type: web
    name: re-sourcing-api
    runtime: node
    plan: starter  # free tier does not support preDeployCommand
    buildCommand: npm install --include=dev && npm run build -w @re-sourcing/contracts && npm run build -w @re-sourcing/db && npm run build -w @re-sourcing/api
    preDeployCommand: npm run db:migrate
    startCommand: npm run start -w @re-sourcing/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: re-sourcing-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false  # set to your web service URL, e.g. https://re-sourcing-web.onrender.com

  - type: web
    name: re-sourcing-web
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build -w @re-sourcing/web
    startCommand: npm run start -w @re-sourcing/web
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false  # set to your API service URL, e.g. https://re-sourcing-api.onrender.com

  # Daily cron: process Gmail inbox for inquiry replies (match to properties, save attachments, run LLM)
  - type: cron
    name: re-sourcing-process-inbox
    runtime: node
    schedule: '0 9 * * *'
    buildCommand: npm install --include=dev && npm run build -w @re-sourcing/contracts && npm run build -w @re-sourcing/db && npm run build -w @re-sourcing/api
    startCommand: cd apps/api && node dist/scripts/triggerProcessInbox.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: re-sourcing-db
          property: connectionString
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false

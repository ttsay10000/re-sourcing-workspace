# Render Blueprint: web UI + API + Postgres
# https://render.com/docs/blueprint-spec
#
# Env vars (set in Render dashboard or here):
#   API:  DATABASE_URL (from Postgres service), NODE_ENV=production, CORS_ORIGIN=<web URL>
#   Web:  NEXT_PUBLIC_API_URL=<API service URL>
#
# After linking repo, add a Postgres database and attach its DATABASE_URL to the api service.
#
# Deploy order: Migrations run in preDeployCommand (after build, before start). If they fail, deploy is cancelled.

services:
  - type: web
    name: re-sourcing-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build -w @re-sourcing/contracts && npm run build -w @re-sourcing/db && npm run build -w @re-sourcing/api
    preDeployCommand: npm run db:migrate
    startCommand: npm run start -w @re-sourcing/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: re-sourcing-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false  # set to your web service URL, e.g. https://re-sourcing-web.onrender.com

  - type: web
    name: re-sourcing-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w @re-sourcing/web
    startCommand: npm run start -w @re-sourcing/web
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false  # set to your API service URL, e.g. https://re-sourcing-api.onrender.com

  # Weekly cron: refresh permit + all enrichment modules for canonical properties
  - type: cron
    name: re-sourcing-permits-refresh
    runtime: node
    schedule: "0 3 * * 0"
    buildCommand: npm install --include=dev && npm run build -w @re-sourcing/contracts && npm run build -w @re-sourcing/db && npm run build -w @re-sourcing/api
    startCommand: cd apps/api && node dist/scripts/enrichAll.js --all
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: re-sourcing-db
          property: connectionString
      - key: SOCRATA_APP_TOKEN
        sync: false
      - key: PERMITS_RATE_LIMIT_DELAY_MS
        value: "500"
      - key: PERMITS_BATCH_SIZE
        value: "50"

databases:
  - name: re-sourcing-db
    plan: free
    databaseName: re_sourcing
    user: re_sourcing
